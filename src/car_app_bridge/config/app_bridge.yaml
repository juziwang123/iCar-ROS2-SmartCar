/**:
  ros__parameters:
    host: 0.0.0.0
    port: 8765
    # Set a non-empty token whenever the port is reachable from an untrusted network.
    auth_token: ''
    manual_topic: /cmd_vel_manual
    mode_topic: /mode_select
    estop_topic: /emergency_stop
    effective_estop_topic: /control/effective_estop
    goal_topic: /goal_pose
    navigation_action: navigate_to_pose
    navigation_frame_id: map
    initial_pose_topic: /initialpose
    control_output_topic: /control/cmd_vel
    lidar_override_topic: /lidar/override_active
    lidar_warning_topic: /lidar/warning
    lidar_warning_state_topic: /lidar/warning_state
    vision_detection_topic: /vision/detections
    follow_target_topic: /vision/follow_target
    person_slow_topic: /vision/person_slow
    person_estop_topic: /vision/person_estop
    status_topic: /app_bridge/status
    robot_pose_topic: /amcl_pose
    mission_status_topic: /mission/status
    mission_event_topic: /mission/event
    mission_action: execute_patrol
    mission_control_service: /mission/control
    maps_root: ~/.icar/maps
    route_database_path: ~/.icar/icar.db
    map_saver_service: /map_saver/save_map
