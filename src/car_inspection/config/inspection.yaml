/**:
  ros__parameters:
    action_name: verify_checkpoint
    localization_topic: /amcl_pose
    control_output_topic: /control/cmd_vel
    image_topic: /camera/color/image_raw
    marker_topic: /inspection/marker_detections
    evidence_root: ~/.icar/evidence
    pose_max_age_sec: 1.0
    motion_max_age_sec: 0.5
    image_max_age_sec: 1.0
    still_linear_speed_mps: 0.02
    still_angular_speed_rps: 0.03
    poll_period_sec: 0.10
    detect_qr: true
    # Optional local QR-specific YOLO model.  Leave empty to keep the original
    # full-frame OpenCV QR decoder.  A configured model detects QR regions;
    # each padded crop is then decoded by OpenCV.
    qr_yolo_model_path: models/qr-detector.pt
    qr_yolo_device: auto
    qr_yolo_confidence_threshold: 0.25
    qr_yolo_iou_threshold: 0.45
    qr_yolo_image_size: 640
    qr_yolo_max_detections: 10
    # Set these to the class names exported by the deployed QR model.  Use an
    # empty list only for a single-class model with an arbitrary class name.
    qr_yolo_labels: [qrcode, qr_code, qr]
    qr_yolo_crop_padding_ratio: 0.10
    # Requires OpenCV aruco/APRILTAG support; unavailable installations
    # continue serving QR and geofence check-ins safely.
    detect_apriltag: true
    inspection_action_name: run_inspection
    inspection_result_topic: /inspection/result
    inspection_detection_topic: /vision/detections
    inspection_image_cache_size: 30
    inspection_detection_cache_size: 60
    inspection_capture_settle_sec: 0.5
    inspection_capture_timeout_sec: 5.0
    inspection_detection_wait_sec: 0.8
    inspection_detection_max_age_sec: 1.5
    # Keep false until the deployed detector has been validated for absence
    # decisions in the real scene.  Otherwise no detection remains UNKNOWN.
    inspection_allow_local_absent: false
    # Deployment-owned VLM endpoint.  Empty disables network calls safely.
    inspection_vlm_endpoint: ''
    inspection_vlm_timeout_sec: 15.0
    inspection_poll_period_sec: 0.05
