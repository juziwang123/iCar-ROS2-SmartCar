/**:
  ros__parameters:
    runtime_service: /runtime/set_profile
    runtime_status_topic: /runtime/status
    manual_topic: /cmd_vel_manual
    mode_topic: /mode_select
    profile_launch_package: car_bringup
    profile_launch_file: runtime_profile.launch.py
    ros2_command: ros2
    profile_ready_timeout_sec: 45.0
    profile_shutdown_timeout_sec: 10.0
