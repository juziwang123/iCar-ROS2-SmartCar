/**:
  ros__parameters:
    image_topic: /camera/color/image_raw
    depth_topic: /camera/depth/image_raw
    target_topic: /vision/color_target
    detection_topic: /vision/detections
    follow_target_topic: /vision/follow_target
    follow_output_topic: /cmd_vel_follow
    person_slow_topic: /vision/person_slow
    person_estop_topic: /vision/person_estop
    output_topic: /cmd_vel_vision
    mode_topic: /mode_select
    h_min: 0
    s_min: 85
    v_min: 80
    h_max: 12
    s_max: 255
    v_max: 255
    min_area: 500.0
    target_area_ratio: 0.08
    area_tolerance: 0.02
    angular_gain: 0.8
    linear_gain: 0.5
    max_linear_speed: 0.18
    max_angular_speed: 0.8
    confidence_threshold: 0.45
    # Place a local .pt model under src/car_vision/models/ (not committed),
    # or override this parameter with an absolute model path at launch time.
    model_path: models/person.pt
    device: auto
    iou_threshold: 0.45
    image_size: 640
    max_detections: 100
    # Named YOLO model registry.  Add a name here and its fields below to
    # register another local model.  ``active_model`` selects one profile;
    # ``active_models`` may list multiple profiles to run them together.
    # ``legacy`` remains available for old parameter files that only set
    # model_path/device.
    model_registry_names: [person, inspection]
    active_model: person
    # Keep a blank entry when disabled; ROS 2 otherwise infers an empty list
    # as a non-string parameter array.  Replace with [person, inspection] to
    # run both profiles concurrently.
    active_models: ['']
    model_registry.person.model_path: models/person.pt
    model_registry.person.device: auto
    model_registry.person.inference_mode: track
    model_registry.person.confidence_threshold: 0.45
    model_registry.person.iou_threshold: 0.45
    model_registry.person.image_size: 640
    model_registry.person.max_detections: 100
    # Replace this path with the inspection-specific model before selecting
    # ``inspection`` through active_model or active_models.
    model_registry.inspection.model_path: models/inspection.pt
    model_registry.inspection.device: auto
    model_registry.inspection.inference_mode: predict
    model_registry.inspection.confidence_threshold: 0.45
    model_registry.inspection.iou_threshold: 0.45
    model_registry.inspection.image_size: 640
    model_registry.inspection.max_detections: 100
    # <= 0 means process every image. Keep this conservative on Jetson.
    inference_rate_hz: 8.0
    person_labels: [person]
    # Depth image must be registered/aligned with the colour image.
    depth_timeout_sec: 0.5
    depth_unit_scale: 0.001
    depth_roi_ratio: 0.5
    depth_min_m: 0.15
    depth_max_m: 8.0
    person_slow_distance_m: 1.2
    person_estop_distance_m: 0.55
    person_estop_confirm_frames: 2
    follow_desired_distance_m: 1.0
    follow_distance_tolerance_m: 0.15
    follow_linear_gain: 0.45
    follow_angular_gain: 0.8
    follow_max_linear_speed: 0.18
    follow_max_angular_speed: 0.7
