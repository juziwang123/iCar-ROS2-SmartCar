schema_version: 1
route_id: demo_visual_inspection
map_id: lab_map
name: Demo visual inspection route
version: 1
loop: false
checkpoints:
  - checkpoint_id: CP-01
    sequence: 1
    name: Door safety equipment
    type: checkin
    pose: {frame_id: map, x: 1.0, y: 0.0, yaw: 0.0}
    arrival:
      position_tolerance_m: 0.30
      yaw_tolerance_rad: 0.35
      dwell_sec: 1.0
      max_pose_covariance: 0.25
    checkin:
      method: visual_marker
      marker_type: qr
      expected_marker_id: ICAR:CP-01
      timeout_sec: 8.0
      retries: 1
      confirmation_frames: 2
    tasks:
      - task_id: CP-01-T01
        type: visual_presence
        target: fire_extinguisher
        # Keep the demo non-blocking until the local model is calibrated.
        required: false
        capture_count: 3
        # Must exactly match /vision/detections.model when non-empty.
        local_model: ''
        use_vlm_fallback: false
        confidence_threshold: 0.70
    failure_policy:
      navigation: retry_then_wait_operator
      checkin: retry_then_wait_operator
      required_task: wait_operator
