schema_version: 1
route_id: demo_visual_checkin
map_id: lab_map
name: 示例视觉打卡路线
version: 1
loop: false
checkpoints:
  - checkpoint_id: CP-01
    sequence: 1
    name: 东门二维码打卡点
    type: checkin
    pose: {frame_id: map, x: 1.0, y: 0.0, yaw: 0.0}
    arrival:
      position_tolerance_m: 0.30
      yaw_tolerance_rad: 0.35
      dwell_sec: 1.0
      max_pose_covariance: 0.25
    checkin:
      method: visual_marker
      marker_type: qr
      expected_marker_id: ICAR:CP-01
      timeout_sec: 8.0
      retries: 1
      confirmation_frames: 2
    tasks: []
    failure_policy:
      navigation: retry_then_wait_operator
      checkin: retry_then_wait_operator
  - checkpoint_id: CP-02
    sequence: 2
    name: 途经围栏点
    type: transit
    pose: {frame_id: map, x: 1.0, y: 1.0, yaw: 1.57}
    arrival:
      position_tolerance_m: 0.30
      yaw_tolerance_rad: 0.35
      dwell_sec: 0.5
      max_pose_covariance: 0.25
    checkin:
      method: geofence
      timeout_sec: 5.0
      retries: 0
      confirmation_frames: 1
    tasks: []
    failure_policy:
      navigation: retry_then_skip
      checkin: alert_and_continue
